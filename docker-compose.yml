version: '3.9'

# ──────────────────────────────────────────────────────────────────────────────
# Wolt Clone – Full Stack
#
# Services:
#   mongo      – MongoDB 7 (data persistence)
#   ex2-server – C++ TCP recommendation server (port 5555)
#   web-server – Node.js/Express API + React web client (port 3000)
#
# Mobile (Expo):
#   Run separately on your machine:
#     cd mobile && npx expo start
#   Set EXPO_PUBLIC_API_URL in mobile/.env:
#     Android emulator : EXPO_PUBLIC_API_URL=http://10.0.2.2:3000/api
#     iOS simulator    : EXPO_PUBLIC_API_URL=http://localhost:3000/api
#     Physical device  : EXPO_PUBLIC_API_URL=http://<YOUR_LAN_IP>:3000/api
# ──────────────────────────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ex2-server:
    build:
      context: .
      dockerfile: Dockerfile.ex2
    container_name: ex2-server
    restart: unless-stopped
    ports:
      - "5555:5555"
    command: ["./server", "5555"]

  web-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      EX2_HOST: "ex2-server"
      EX2_PORT: "5555"
      JWT_SECRET: "wolt_dev_secret_1234"
      MONGO_URI: "mongodb://mongo:27017/wolt"
    depends_on:
      - mongo
      - ex2-server

volumes:
  mongo_data: